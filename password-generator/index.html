<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="../css/password-generator.css">
</head>
<body>
    <header>
        <h1>Password Generator</h1>
    </header>
    
    <main>
        <div id="pass-options">
            <form action="#">
                <fieldset>
                    <legend>Character Options</legend>
                    
                    <div class="form-group">
                        <label for="pass-numbers">
                            Numbers (0 - 9)
                        </label>
                        <input type="checkbox" name="numbers" id="pass-numbers" checked>
                    </div>
                    
                    <div class="form-group">
                        <label for="lower-case">
                            Lowercase letters (a..z)
                        </label>
                        <input type="checkbox" name="lower-case" id="lower-case" checked>
                    </div>
                    
                    <div class="form-group">
                        <label for="upper-case">
                            Uppercase Letters (A..Z)
                        </label>
                        <input type="checkbox" name="upper-case" id="upper-case" checked>
                    </div>
                    
                    <div class="form-group">
                        <label for="pass-symbols">
                            Symbols
                        </label>
                        <input type="checkbox" name="symbols" id="pass-symbols" checked>
                        <input type="text" name="symbols-list" id="symbols-list" value="?@^_!#%&$">
                    </div>
                </fieldset>
                
                <fieldset>
                    <legend>Settings</legend>
                    
                    <div class="form-group">
                        <label for="pass-length">
                            Password Length
                        </label>
                        <input type="number" name="pass-length" id="pass-length" value="15" min="1" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="pass-quantity">
                            How Many Passwords?
                        </label>
                        <input type="number" name="pass-quantity" id="pass-quantity" value="1" min="1" max="50">
                    </div>
                    
                    <div class="form-group">
                        <button type="button" id="generate-btn" class="g-button">Generate</button>
                    </div>
                </fieldset>
            </form>
        </div>
        
        <div id="pass-results">
            <h2>Generated Passwords</h2>
        </div>
    </main>
    
    <script src="../js/password-generator.js"></script>
</body>
</html>
