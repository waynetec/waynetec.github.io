<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Pressure Averager</title>
    <link rel="stylesheet" href="css/blood-pressure.css">
</head>
<body>
    <header>
        <h1>Blood Pressure Averager</h1>
    </header>
    
    <main>
        <form action="#">
            <div class="frmDiv">
                <label for="systolic">Systolic</label>
                <input type="number" name="sys" id="systolic" required>
            </div>
            <div class="frmDiv">
                <label for="diastolic">Diastolic</label>
                <input type="number" name="dia" id="diastolic" required>
            </div>
            <div class="frmDiv">
                <label for="pulse">Pulse</label>
                <input type="number" name="pulse" id="pulse" required>
            </div>
            <div class="frmDiv">
                <button type="button" id="add-btn">Add Reading</button>
            </div>
           
           <hr>
           
           <div id="results">
               <div class="frmDiv"><label>Number of Readings</label></div>
               <div class="frmDiv" id="numOfReadings">0</div>
               
               <div class="frmDiv"><label>Average Systolic</label></div>
               <div class="frmDiv" id="averageSys">0</div>

               <div class="frmDiv"><label>Average Diastolic</label></div>
               <div class="frmDiv" id="averageDia">0</div>

               <div class="frmDiv"><label>Average Pulse</label></div>
               <div class="frmDiv" id="averagePulse">0</div>
           </div>
           
           <div class="frmDiv">
               <button type="button" id="clear-btn">Clear Readings</button>
           </div>
        </form>
    </main>
    
    <script src="js/blood-pressure.js"></script>
</body>
</html>
