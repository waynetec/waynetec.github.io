<!doctype html>

<html lang="en">
    <head>
        <title>Dice Roller</title>
        <link rel="stylesheet" href="../css/dice-tossing.css">
    </head>
    <body>
        <header>
            <h1 id="heading">Dice Tossing</h1>
        </header>
        
        <main>
            <div id="label-div">How many dice do you want?</div>
            <div id="input-div">
                <input type="number" name="quantity-input" id="quantity-input" class="quantity" placeholder="How many dice?" value="5" min="1" max="100">
            </div>
            <div id="btn-div">
                <button class="toss-dice" id="toss-dice">Toss Dice</button>
            </div>
            <div id="dice-table">
            </div>
        </main>
        
        <script src="../js/dice-tossing.js"></script>
    </body>
</html>
